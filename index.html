<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="/assets/images/computer-chip.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>Max Oliveira</title>
</head>

<body>
    <main>
        <section class="profile">
            <div class="profile-container">
                <div class="profile-photo">
                    <div class="border">
                        <img src="/assets/images/maxoliveira.jpg" alt="">
                    </div>
                </div>
                <div class="profile-data">
                    <div class="name">
                        <h1>
                            Max Rosa de Oliveira Junior
                        </h1>

                    </div>
                    <div class="profile-describe">
                        <div class="work">
                            <div class="work-title">
                                <h2>
                                    Desenvolvedor fullstack Jr.
                                </h2>
                            </div>
                            <div class="adress">
                                <p>
                                    Belém, Pará
                                </p>
                            </div>

                        </div>
                        <div class="sociais">
                            <img src="/assets/images/linkedin.png" alt="">
                            <img style="background-color: white; border-radius: 50%;" src="/assets/images/github.png" alt="">
                        </div>
                    </div>
                    <div class="profile-infor">
                        <div class="infor-hiring">
                            <p>Contratação CLT R$ 2.800,00</p>
                            <p>Contratação PJ R$ 4.000,00</p>
                        </div>
                        <div class="infor-availability">

                            <p>Disponibilidade para mudança</p>
                            <p>Carteira de Habilitação A/B</p>
                        </div>

                    </div>
                </div>
            </div>
        </section>
        <section class="conteudo">
            
        </section>
        </div>
    </main>
</body>

</html>
